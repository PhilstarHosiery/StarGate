server:
  grpc_addr: ":50051"
  webhook_addr: ":8080"

database:
  path: "stargate.db"

sms:
  gate_url: "http://192.168.1.1:8080"   # SMS Gate local API base URL
  username: "your-username"             # Local Mode basic auth (SMS Gate → Settings → Local Server)
  password: "your-password"             # Local Mode basic auth
  api_key: ""                           # Cloud Mode bearer token (leave empty for Local Mode)
  webhook_secret: "your-signing-key"    # SMS Gate → Settings → Webhooks → Signing Key