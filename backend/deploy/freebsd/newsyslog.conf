# newsyslog configuration for StarGate SMS Gateway
#
# Installation:
#   cp newsyslog.conf /etc/newsyslog.conf.d/stargate.conf
#
# Format:
#   logfile  [owner:group]  mode  count  size  when  [flags  [/pid_file  [sig_num]]]
#
# Flags:
#   B - binary (no "log file turned over" message appended)
#   C - create log file if it doesn't exist
#   J - bzip2 compress rotated file
#
# Rotates daily at midnight; keeps 7 compressed archives.
# Sends SIGHUP (signal 1) to the server process so it reopens the log file.

/var/log/stargate/server.log  stargate:stargate  640  7  *  @T00  BCJ  /var/run/stargate-server.pid  1
